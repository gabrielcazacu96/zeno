name: Generate PR changeset

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, edited, labeled, unlabeled, ready_for_review]
    paths-ignore:
      - ".changeset/**"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate changeset
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate changeset
        run: node ./scripts/create-pr-changeset.mjs
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          GITHUB_PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_PR_TITLE: ${{ github.event.pull_request.title }}
          GITHUB_PR_URL: ${{ github.event.pull_request.html_url }}

      - name: Commit generated changeset
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A ".changeset/pr-${PR_NUMBER}.md"

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "chore: update PR changeset for #${PR_NUMBER}"
          git push
